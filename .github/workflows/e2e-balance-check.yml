name: E2E Wallet Balance Check

on:
  workflow_dispatch: {}
  workflow_call:
    secrets:
      SLACK_FAUCETBOT_WEBHOOK_URL:
        required: false

permissions:
  contents: read

env:
  BASE_USDC: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
  BASE_RPC: 'https://mainnet.base.org'
  OP_USDC: '0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85'
  OP_RPC: 'https://mainnet.optimism.io'
  ARB_USDT: '0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9'
  ARB_RPC: 'https://arb1.arbitrum.io/rpc'

jobs:
  check-balance:
    name: Check E2E Wallet Balances
    runs-on: ubuntu-latest
    env:
      SLACK_FAUCETBOT_WEBHOOK_URL: ${{ secrets.SLACK_FAUCETBOT_WEBHOOK_URL }}
    steps:
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Check USDC balance on Base
        id: usdc_balance
        run: |
          BALANCE=$(cast call --rpc-url "$BASE_RPC" "$BASE_USDC" \
            "balanceOf(address)(uint256)" \
            "${{ vars.TEST_WALLET_ADDRESS }}" | sed 's/\[.*\]//' | tr -d '[:space:]')
          echo "balance=$BALANCE" >> $GITHUB_OUTPUT
          BALANCE_HUMAN=$(echo "scale=2; $BALANCE / 1000000" | bc)
          echo "USDC on Base: $BALANCE_HUMAN ($BALANCE raw)"

      - name: Prepare USDC alert
        id: usdc_alert
        run: |
          BALANCE="${{ steps.usdc_balance.outputs.balance }}"
          THRESHOLD="${{ vars.USDC_THRESHOLD_UNITS || '1000000' }}"
          if [ "$BALANCE" -lt "$THRESHOLD" ]; then
            BALANCE_HUMAN=$(echo "scale=2; $BALANCE / 1000000" | bc)
            THRESHOLD_HUMAN=$(echo "scale=2; $THRESHOLD / 1000000" | bc)
            ALERT_TEXT="[request] Can i have ${THRESHOLD_HUMAN} USDC on Base in wallet: \
              ${{ vars.TEST_WALLET_ADDRESS }}"
            echo "should_alert=true" >> "$GITHUB_OUTPUT"
            echo "text=$ALERT_TEXT" >> "$GITHUB_OUTPUT"
            echo "::warning::$ALERT_TEXT"
          fi

      - name: Send Slack alert (USDC)
        if: |
          steps.usdc_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ env.SLACK_FAUCETBOT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.usdc_alert.outputs.text }}"
            }

      - name: Skip Slack alert (USDC - no webhook)
        if: |
          steps.usdc_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL == ''
        run: |
          echo "::warning::SLACK_FAUCETBOT_WEBHOOK_URL not configured, skipping USDC alert"

      - name: Check USDC balance on Optimism
        id: op_usdc_balance
        run: |
          BALANCE=$(cast call --rpc-url "$OP_RPC" "$OP_USDC" \
            "balanceOf(address)(uint256)" \
            "${{ vars.TEST_WALLET_ADDRESS }}" | sed 's/\[.*\]//' | tr -d '[:space:]')
          echo "balance=$BALANCE" >> $GITHUB_OUTPUT
          BALANCE_HUMAN=$(echo "scale=2; $BALANCE / 1000000" | bc)
          echo "USDC on Optimism: $BALANCE_HUMAN ($BALANCE raw)"

      - name: Prepare USDC on Optimism alert
        id: op_usdc_alert
        run: |
          BALANCE="${{ steps.op_usdc_balance.outputs.balance }}"
          THRESHOLD="${{ vars.USDC_THRESHOLD_UNITS || '1000000' }}"
          if [ "$BALANCE" -lt "$THRESHOLD" ]; then
            BALANCE_HUMAN=$(echo "scale=2; $BALANCE / 1000000" | bc)
            THRESHOLD_HUMAN=$(echo "scale=2; $THRESHOLD / 1000000" | bc)
            ALERT_TEXT="[request] Can i have ${THRESHOLD_HUMAN} USDC on Optimism in wallet: \
              ${{ vars.TEST_WALLET_ADDRESS }}"
            echo "should_alert=true" >> "$GITHUB_OUTPUT"
            echo "text=$ALERT_TEXT" >> "$GITHUB_OUTPUT"
            echo "::warning::$ALERT_TEXT"
          fi

      - name: Send Slack alert (USDC on Optimism)
        if: |
          steps.op_usdc_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ env.SLACK_FAUCETBOT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.op_usdc_alert.outputs.text }}"
            }

      - name: Skip Slack alert (USDC on Optimism - no webhook)
        if: |
          steps.op_usdc_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL == ''
        run: |
          echo "::warning::SLACK_FAUCETBOT_WEBHOOK_URL not configured, skipping Optimism USDC alert"

      # USDT on Arbitrum funds the pay_usdt_arbitrum Permit2 flow (the actual payment).
      - name: Check USDT balance on Arbitrum
        id: arb_usdt_balance
        run: |
          BALANCE=$(cast call --rpc-url "$ARB_RPC" "$ARB_USDT" \
            "balanceOf(address)(uint256)" \
            "${{ vars.TEST_WALLET_ADDRESS }}" | sed 's/\[.*\]//' | tr -d '[:space:]')
          echo "balance=$BALANCE" >> $GITHUB_OUTPUT
          BALANCE_HUMAN=$(echo "scale=2; $BALANCE / 1000000" | bc)
          echo "USDT on Arbitrum: $BALANCE_HUMAN ($BALANCE raw)"

      - name: Prepare USDT on Arbitrum alert
        id: arb_usdt_alert
        run: |
          BALANCE="${{ steps.arb_usdt_balance.outputs.balance }}"
          THRESHOLD="${{ vars.USDT_ARBITRUM_THRESHOLD_UNITS || '5000000' }}"
          if [ "$BALANCE" -lt "$THRESHOLD" ]; then
            BALANCE_HUMAN=$(echo "scale=2; $BALANCE / 1000000" | bc)
            THRESHOLD_HUMAN=$(echo "scale=2; $THRESHOLD / 1000000" | bc)
            ALERT_TEXT="[request] Can i have ${THRESHOLD_HUMAN} USDT on Arbitrum in wallet: \
              ${{ vars.TEST_WALLET_ADDRESS }}"
            echo "should_alert=true" >> "$GITHUB_OUTPUT"
            echo "text=$ALERT_TEXT" >> "$GITHUB_OUTPUT"
            echo "::warning::$ALERT_TEXT"
          fi

      - name: Send Slack alert (USDT on Arbitrum)
        if: |
          steps.arb_usdt_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ env.SLACK_FAUCETBOT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.arb_usdt_alert.outputs.text }}"
            }

      - name: Skip Slack alert (USDT on Arbitrum - no webhook)
        if: |
          steps.arb_usdt_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL == ''
        run: |
          echo "::warning::SLACK_FAUCETBOT_WEBHOOK_URL not configured, skipping Arbitrum USDT alert"

      # Native ETH gas on Arbitrum: needed for both the payment txs (approve + pay)
      # and the post-test Permit2 allowance-reset tx.
      - name: Check ETH gas balance on Arbitrum
        id: arb_eth_balance
        run: |
          BALANCE=$(cast balance --rpc-url "$ARB_RPC" "${{ vars.TEST_WALLET_ADDRESS }}" | tr -d '[:space:]')
          echo "balance=$BALANCE" >> $GITHUB_OUTPUT
          BALANCE_HUMAN=$(echo "scale=6; $BALANCE / 1000000000000000000" | bc)
          echo "ETH on Arbitrum: $BALANCE_HUMAN ($BALANCE wei)"

      - name: Prepare Arbitrum ETH gas alert
        id: arb_eth_alert
        run: |
          BALANCE="${{ steps.arb_eth_balance.outputs.balance }}"
          THRESHOLD="${{ vars.ARBITRUM_ETH_THRESHOLD_WEI || '1000000000000000' }}"
          # Use bc for the comparison: ETH wei values overflow shell arithmetic.
          if [ "$(echo "$BALANCE < $THRESHOLD" | bc)" -eq 1 ]; then
            BALANCE_HUMAN=$(echo "scale=6; $BALANCE / 1000000000000000000" | bc)
            THRESHOLD_HUMAN=$(echo "scale=6; $THRESHOLD / 1000000000000000000" | bc)
            ALERT_TEXT="[request] Can i have ${THRESHOLD_HUMAN} ETH (gas) on Arbitrum in wallet: \
              ${{ vars.TEST_WALLET_ADDRESS }} (currently ${BALANCE_HUMAN})"
            echo "should_alert=true" >> "$GITHUB_OUTPUT"
            echo "text=$ALERT_TEXT" >> "$GITHUB_OUTPUT"
            echo "::warning::$ALERT_TEXT"
          fi

      - name: Send Slack alert (Arbitrum ETH gas)
        if: |
          steps.arb_eth_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ env.SLACK_FAUCETBOT_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.arb_eth_alert.outputs.text }}"
            }

      - name: Skip Slack alert (Arbitrum ETH gas - no webhook)
        if: |
          steps.arb_eth_alert.outputs.should_alert == 'true' &&
          env.SLACK_FAUCETBOT_WEBHOOK_URL == ''
        run: |
          echo "::warning::SLACK_FAUCETBOT_WEBHOOK_URL not configured, skipping Arbitrum ETH gas alert"
