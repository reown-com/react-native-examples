name: release-android-base

permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      name:
        description: 'Name of the project'
        required: true
        type: string
      root-path:
        description: 'Path of the react-native project'
        required: true
        type: string
      release-type:
        description: 'Release type of the project (debug/internal/production)'
        default: 'internal'
        type: string
      project-type:
        description: 'Type of project (wallet/dapp)'
        required: true
        type: string
      output-path:
        description: 'Path to get the APK file'
        required: true
        type: string
      upload-to-bucket:
        description: "Upload to S3"
        required: false
        default: false
        type: boolean
      package-manager:
        description: "Package manager of the project"
        required: false
        default: 'yarn'
        type: string
      is-expo-project:
        description: "Is Expo project"
        required: false
        default: false
        type: boolean
      firebase-app-id:
        description: "Firebase App ID for distribution"
        required: true
        type: string
    secrets:
      gsa-key:
        required: true
      sentry-file:
        required: true
      secrets-file:
        required: true
      keystore-name:
        required: true
      keystore:
        required: true
      aws-account-id:
        required: false
      slack-webhook-url:
        required: true
      firebase-url:
        description: 'Firebase URL of the project'
        required: false
      env-file:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/ci-setup
        with:
          root-path: ${{ inputs.root-path }}
          package-manager: ${{ inputs.package-manager }}

      - name: Expo Prebuild
        if: ${{ inputs.is-expo-project == true }}
        run: |
          cd ${{ inputs.root-path }}
          npx expo prebuild --platform android

      - name: Install Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          architecture: x86_64

      # Create env file
      - name: Create env file
        run: |
          if [ -z "${{ secrets.env-file }}" ]; then
            echo "Error: env-file secret is empty or not set"
            exit 1
          fi
          echo "${{ secrets.env-file }}" > ${{ inputs.root-path }}/.env

      - name: Copy variant files
        run: |
          cd ${{ inputs.root-path }}
          if [ -f "./scripts/copy-variant-files.sh" ]; then
            chmod +x ./scripts/copy-variant-files.sh
            ./scripts/copy-variant-files.sh ${{ inputs.release-type }}
          fi
      
      - name: Add Sentry file
        run: touch ${{ inputs.root-path }}/android/sentry.properties && echo "${{ secrets.sentry-file }}" >> ${{ inputs.root-path }}/android/sentry.properties

      - name: Add Secrets file
        run: touch ${{ inputs.root-path }}/android/secrets.properties && echo "${{ secrets.secrets-file }}" > ${{ inputs.root-path }}/android/secrets.properties

      - name: Add Keystore file
        run: echo ${{ secrets.keystore }} | base64 --decode >> ${{ inputs.root-path }}/android/app/${{ secrets.keystore-name }}.keystore

      - name: Optimize Gradle for CI
        run: |
          printf '\norg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m\norg.gradle.parallel=true\norg.gradle.caching=true\n' >> ${{ inputs.root-path }}/android/gradle.properties

      - name: Configure ABI for internal builds
        if: ${{ inputs.release-type == 'internal' }}
        run: |
          printf 'reactNativeArchitectures=arm64-v8a,armeabi-v7a\n' >> ${{ inputs.root-path }}/android/gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ inputs.is-expo-project == false && format('{0}/android/.gradle', inputs.root-path) || '' }}
          key: ${{ runner.os }}-gradle-${{ inputs.name }}-${{ inputs.is-expo-project == true && hashFiles(format('{0}/package.json', inputs.root-path), format('{0}/app.json', inputs.root-path)) || hashFiles(format('{0}/android/**/*.gradle*', inputs.root-path), format('{0}/android/**/gradle-wrapper.properties', inputs.root-path)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ inputs.name }}-

      # RN/AGP fetches the build-requested NDK on the fly during Build APK, and
      # that download intermittently lands corrupted on CI runners
      # ("Archive is not a ZIP archive" -> InstallFailedException) — failing the
      # build but passing on rerun. Pre-install it via sdkmanager so the build
      # finds it locally. The version is read from the generated
      # android/build.gradle — the exact one the build resolves (Expo apps: pinned
      # by plugins/withAndroidNdkVersion.js; committed-native apps: their
      # buildscript ext) — so it can't drift. Apps that don't pin it are skipped
      # (no regression). Retry so a corrupted archive self-heals. Mirrors the
      # E2E action's Install Android NDK step.
      - name: Pre-install Android NDK
        run: |
          set -euo pipefail
          ANDROID_DIR="${{ inputs.root-path }}/android"
          # Extraction must not abort the step: grep exits non-zero when nothing
          # matches (apps that don't pin a literal ndkVersion, or a missing
          # android/build.gradle), and under `set -e -o pipefail` that would kill
          # the step before the skip check below. Disable pipefail and `|| true`
          # so an empty result flows through to the graceful skip.
          set +o pipefail
          NDK_VERSION="$(grep -rhoE 'ndkVersion[^"]*"[0-9][0-9.]+"' \
            "$ANDROID_DIR/build.gradle" "$ANDROID_DIR/app/build.gradle" 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)"
          set -o pipefail
          if [ -z "${NDK_VERSION:-}" ]; then
            echo "No pinned ndkVersion found under $ANDROID_DIR — skipping NDK pre-install."
            exit 0
          fi
          echo "Resolved ndkVersion=$NDK_VERSION (from generated android/build.gradle)"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          # Accept licenses so the install runs unattended; `yes` feeds the prompts
          # (and takes SIGPIPE on exit, hence `|| true`).
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          status=1
          for attempt in 1 2 3; do
            echo "=== sdkmanager NDK install attempt $attempt/3 (ndk;$NDK_VERSION) ==="
            # pipefail off: `yes` takes SIGPIPE when sdkmanager exits, which would
            # otherwise mask sdkmanager's exit code. The `if` is exempt from set -e,
            # so a failed install is captured and retried instead of aborting.
            set +o pipefail
            if yes | "$SDKMANAGER" --install "ndk;$NDK_VERSION"; then
              status=0
            else
              status=$?
            fi
            set -o pipefail
            [ "$status" -eq 0 ] && break
            echo "NDK install attempt $attempt failed (exit $status); clearing partial download and retrying"
            rm -rf "$ANDROID_HOME/ndk/$NDK_VERSION"
          done
          [ "$status" -eq 0 ] || { echo "Error: NDK install failed after 3 attempts"; exit 1; }

      - name: Build APK
        id: build
        run: |
          if [ ${{ inputs.release-type }} = 'internal' ]; then
            cd ${{ inputs.root-path }} && ${{ inputs.package-manager }} run android:build:internal
          else
            cd ${{ inputs.root-path }} && ${{ inputs.package-manager }} run android:build
          fi
  
      - name: Debug - Dump APK theme resources
        if: ${{ inputs.release-type == 'internal' }}
        run: |
          APK_PATH="${{ inputs.output-path }}"
          echo "=== APK theme resources ==="
          $ANDROID_HOME/build-tools/36.0.0/aapt2 dump resources "$APK_PATH" 2>&1 | grep -A15 "style/AppTheme\|style/BootTheme" || true
          echo "=== AndroidManifest theme ==="
          $ANDROID_HOME/build-tools/36.0.0/aapt2 dump xmltree "$APK_PATH" --file AndroidManifest.xml 2>&1 | grep -i "theme" || true
          echo "=== Effective gradle.properties ==="
          cat ${{ inputs.root-path }}/android/gradle.properties

      - name: Upload APK to Firebase
        id: firebase-upload
        continue-on-error: false
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{ inputs.firebase-app-id }}
          serviceCredentialsFileContent: ${{ secrets.gsa-key }}
          groups: flutter-team, javascript-team, kotlin-team, unity, rust-team, swift-team, wc-testers
          file: ${{ inputs.output-path }}
          releaseNotes: "${{ inputs.name }} (${{ inputs.project-type }}) - ${{ inputs.release-type }} - Branch: ${{ github.ref_name }}"
    
      - name: Configure AWS credentials
        id: aws-creds
        if: ${{ inputs.upload-to-bucket == true }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8
        with:
          role-to-assume: arn:aws:iam::${{ secrets.aws-account-id }}:role/prod-github-actions-react-native-builds
          aws-region: eu-central-1
          output-env-credentials: false
          output-credentials: true

      - name: Upload Android build to S3
        id: s3-upload
        if: ${{ inputs.upload-to-bucket == true }}
        env:
          AWS_REGION: eu-central-1
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
        continue-on-error: true
        run: |
          aws s3 cp \
            ${{ inputs.output-path }} \
            s3://walletconnect.react-native-builds.prod/android/${{ inputs.release-type }}/${{ inputs.project-type }}-${{ inputs.release-type }}.apk

      - name: Send Slack notification
        if: always() && !cancelled()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.slack-webhook-url }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Android Build Report - ${{ inputs.name }} - ${{ inputs.release-type }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🤖 Android Build Report" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Project:*\n`${{ inputs.name }}`" },
                    { "type": "mrkdwn", "text": "*Release Type:*\n`${{ inputs.release-type }}`" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Build:*\n`${{ steps.build.outcome == 'success' && '✅ Success' || '❌ Failed' }}`" },
                    { "type": "mrkdwn", "text": "*Firebase Upload:*\n`${{ steps.firebase-upload.outcome == 'success' && '✅ Success' || steps.firebase-upload.outcome == 'failure' && '❌ Failed' || '⏭️ Skipped' }}`" },
                    { "type": "mrkdwn", "text": "*S3 Upload:*\n`${{ steps.s3-upload.outcome == 'success' && '✅ Success' || steps.s3-upload.outcome == 'failure' && '❌ Failed' || '⏭️ Skipped' }}`" },
                    { "type": "mrkdwn", "text": "*Overall Status:*\n`${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }${{ steps.build.outcome == 'success' && steps.firebase-upload.outcome == 'success' && secrets.firebase-url != '' && format(',{{"type":"button","text":{{"type":"plain_text","text":"View in Firebase"}},"url":"{0}"}}', secrets.firebase-url) || '' }}
                  ]
                }
              ]
            }
